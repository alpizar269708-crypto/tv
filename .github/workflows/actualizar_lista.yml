name: Actualizar Lista IPTV

on:
  schedule:
    - cron: '0 0,12 * * *' # Se ejecuta cada 12 horas
  workflow_dispatch: # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Ejecutar script de actualización
      run: python update_tv.py

    - name: Commit y Push de los cambios
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add lista.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de lista.m3u" && git push)
